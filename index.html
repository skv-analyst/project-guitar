<meta charset="utf-8">
<title>Guitar Practice</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F6F4EF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Guitar Practice">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-badge">GP</div>
      <span class="logo-name">Guitar Practice</span>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-screen="rhythm" role="tab" aria-selected="true">Ритм</button>
      <button class="tab" data-screen="fretboard" role="tab" aria-selected="false">Гриф</button>
      <button class="tab" data-screen="plan" role="tab" aria-selected="false">План</button>
    </nav>
  </header>

  <main class="screens">
    <section id="screen-rhythm" class="screen active">
      <div class="rhythm-layout">

        <div class="panel">
          <div class="bpm-display">
            <div class="bpm-number-row">
              <span id="bpmValue" class="mono">70</span>
              <span class="bpm-unit mono">BPM</span>
            </div>
            <div class="bpm-controls">
              <button class="bpm-btn mono" data-delta="-5">−5</button>
              <button class="bpm-btn mono" data-delta="-1">−1</button>
              <button class="bpm-btn mono" data-delta="1">+1</button>
              <button class="bpm-btn mono" data-delta="5">+5</button>
            </div>
            <div class="transport-row">
              <button id="startBtn" class="start-btn">СТАРТ</button>
              <button id="tapBtn" class="tap-btn">TAP</button>
            </div>
            <div class="signature-row">
              <button class="signature-btn active" data-sig="4/4">4/4</button>
              <button class="signature-btn" data-sig="4/8">4/8</button>
              <button class="signature-btn" data-sig="4/16">4/16</button>
            </div>
            <div class="accent-toggle">
              <span>Акцент на 1</span>
              <div id="accentSwitch" class="switch on"></div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="bar-table" id="barTable">
            <div class="hl-layer" id="hlLayer"></div>
            <div class="note-layer" id="noteLayer"></div>
          </div>
          <button id="generateBtn" class="generate-btn">⚡ Генерировать ритм</button>
        </div>

      </div>
    </section>

    <section id="screen-fretboard" class="screen">

      <div class="panel">
        <div class="control-row">
          <div class="pill-toggle">
            <button class="durmoll-btn active" data-durmoll="dur">dur</button>
            <button class="durmoll-btn" data-durmoll="moll">moll</button>
          </div>
          <div class="fill-row" id="keyRow"></div>
        </div>
        <div class="control-row">
          <div class="pill-toggle">
            <button class="view-btn active" data-view="caged">EDCAG</button>
            <button class="view-btn" data-view="boxes">BOX</button>
          </div>
          <div class="fill-row" id="degreeMiniRow"></div>
        </div>
      </div>

      <div class="panel">
        <div class="shape-filter" id="shapeFilter"></div>
        <div class="legend" id="legend"></div>
        <div class="fretboard-wrap" id="fretboardWrap">
          <svg id="fretboardSvg" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
      </div>

      <div class="panel" id="group3Caged">
        <div class="progression-filter" id="progressionFilter"></div>
        <div class="sequence-row" id="sequenceGrid"></div>
      </div>

      <div class="panel" id="group3Boxes" style="display:none;">
        <div class="seq-dropdown">
          <button class="seq-dropdown-toggle" id="seqToggle">
            <span class="seq-name" id="seqToggleLabel">Выберите паттерн</span>
            <span class="seq-cubes" id="seqTogglePreview"></span>
            <span class="seq-chevron">▾</span>
          </button>
          <div class="seq-dropdown-panel" id="seqPanel"></div>
        </div>
      </div>

    </section>

    <section id="screen-plan" class="screen">

      <div class="panel timer-panel">
        <div id="timerDisplay" class="mono">00:00:00</div>
        <div class="timer-controls">
          <button id="timerStart" class="timer-btn timer-start">Старт</button>
          <button id="timerReset" class="timer-btn timer-reset">Сброс</button>
        </div>
        <div id="totalTime" class="total-time">Всего позанимался: 0 ч 0 мин</div>
      </div>

      <div class="plan-progress">Отмечено выполненными: <b id="doneCount">0</b> из 21 дня</div>

      <div id="planList"></div>

    </section>
  </main>
</div>

<script src="js/theory.js"></script>
<script src="js/data/caged.js"></script>
<script src="js/data/boxes.js"></script>
<script src="js/data/sequences.js"></script>
<script src="js/data/progressions.js"></script>
<script src="js/data/plan.js"></script>
<script src="js/fretboard.js"></script>
<script src="js/rhythm-screen.js"></script>
<script src="js/fretboard-screen.js"></script>
<script src="js/plan-screen.js"></script>
<script src="js/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("service-worker.js");
    });
  }
</script>
