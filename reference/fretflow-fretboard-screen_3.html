<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FretFlow — Гриф</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F4EF;
    --card: #FFFFFF;
    --card2: #EFEBE2;
    --line: #E1DCD0;
    --accent: #C1633E;
    --accent-dark: #A8502F;
    --accent-contrast: #FFFFFF;
    --third: #B98B3E;
    --fifth: #6B8A6E;
    --relminor: #8B5A6B;
    --other: #C7C0AF;
    --muted: #8C8678;
    --text: #201E1A;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-badge {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: var(--accent-contrast); font-size: 13px;
  }
  .logo-name { font-weight: 800; font-size: 17px; letter-spacing: -0.01em; }
  .tabs { display: flex; gap: 4px; }
  .tab {
    padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600;
    color: var(--muted); border: 1px solid transparent; white-space: nowrap;
  }
  .tab.active { color: var(--text); background: var(--card2); border-color: var(--line); }

  main {
    max-width: 1320px;
    margin: 0 auto;
    padding: 24px 32px 48px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 20px;
  }

  .section-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); font-weight: 700; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .key-static {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--card2); border: 1px solid var(--line);
    border-radius: 12px; padding: 10px 16px;
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px;
  }

  .segmented { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: var(--card2); border-radius: 14px; padding: 4px; }
  .segmented button {
    height: 46px; border: none; border-radius: 10px; background: transparent;
    color: var(--muted); font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .segmented button.active { background: var(--card); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .segmented button:disabled { color: #C9C4B7; cursor: not-allowed; }

  .controls-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px; }
  .controls-row > * { flex: 1; min-width: 160px; }

  .shape-filter { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .shape-chip {
    flex: 1; min-width: 48px; height: 44px; border-radius: 12px;
    border: 1.5px solid var(--shape-color, var(--line));
    background: var(--card); color: var(--shape-color, var(--text));
    font-weight: 800; font-size: 14px; cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .shape-chip.active { background: var(--shape-color, var(--accent)); color: #fff; }
  .shape-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

  .fretboard-wrap {
    margin-top: 16px;
    overflow-x: auto;
    background: var(--card2);
    border-radius: 18px;
    border: 1px solid var(--line);
    padding: 8px 4px;
  }
  #fretboardSvg { display: block; }

  .legend { display: flex; gap: 18px; margin-top: 14px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .legend-dot { width: 16px; height: 16px; border-radius: 50%; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-badge">FF</div>
    <span class="logo-name">FretFlow</span>
  </div>
  <div class="tabs">
    <div class="tab">Ритм</div>
    <div class="tab active">Гриф</div>
    <div class="tab">Секундомер</div>
  </div>
</header>

<main>

  <div class="panel">
    <div class="section-title"><span>Тональность</span></div>
    <div class="key-static" id="keyStatic">C · мажор</div>

    <div class="top-grid">
      <div class="controls-row" style="margin-top:14px;">
        <div class="segmented">
          <button class="mode-btn active" data-mode="major">Мажор</button>
          <button class="mode-btn" data-mode="minor" disabled>Минор</button>
        </div>
      </div>
      <div class="controls-row" style="margin-top:14px;">
        <div class="segmented">
          <button class="view-btn active" data-view="caged">Формы CAGED</button>
          <button class="view-btn" data-view="boxes">Боксы (1–7)</button>
        </div>
      </div>
    </div>

    <div class="shape-filter" id="shapeFilter"></div>
    <div class="shape-hint" id="shapeHint"></div>
  </div>

  <div class="panel">
    <div class="section-title">
      <span id="fretboardTitle">Гриф</span>
    </div>
    <div class="fretboard-wrap" id="fretboardWrap">
      <svg id="fretboardSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="legend" id="legend"></div>
  </div>

</main>

<script>
const STRING_NAMES = ['e','B','G','D','A','E'];

const SHAPE_COLOR = { C:'#C1633E', A:'#6B8A6E', G:'#B98B3E', E:'#7C7AA6', D:'#4F8FA6' };
const SHAPE_ORDER = ['C','A','G','E','D'];
// готовые лады для C мажор (без транспонизации — это статичный макет)
const SHAPE_FRET_SHIFT = { C:1, A:4, G:6, E:9, D:11 };

const SHAPES = {
  C: [ {string:5, fret:3, role:'R'}, {string:4, fret:2, role:'3'}, {string:3, fret:0, role:'5'},
       {string:2, fret:1, role:'R'}, {string:1, fret:0, role:'3'} ],
  A: [ {string:5, fret:0, role:'R'}, {string:4, fret:2, role:'5'}, {string:3, fret:2, role:'R'},
       {string:2, fret:2, role:'3'}, {string:1, fret:0, role:'5'} ],
  G: [ {string:6, fret:3, role:'R'}, {string:5, fret:2, role:'3'}, {string:4, fret:0, role:'5'},
       {string:3, fret:0, role:'R'}, {string:2, fret:0, role:'3'}, {string:1, fret:3, role:'R'} ],
  E: [ {string:6, fret:0, role:'R'}, {string:5, fret:2, role:'5'}, {string:4, fret:2, role:'R'},
       {string:3, fret:1, role:'3'}, {string:2, fret:0, role:'5'}, {string:1, fret:0, role:'R'} ],
  D: [ {string:4, fret:0, role:'R'}, {string:3, fret:2, role:'5'}, {string:2, fret:3, role:'R'},
       {string:1, fret:2, role:'3'} ],
};

const MODE_NAMES = ['Ионийский','Дорийский','Фригийский','Лидийский','Миксолидийский','Эолийский','Локрийский'];
// готовые лады боксов для C мажор (без транспонизации)
const BOX_ANCHOR = [1, 3, 5, 6, 8, 10, 12];
const BOX_COLOR = ['#C1633E','#B98B3E','#8B8B4E','#6B8A6E','#4F8FA6','#7C7AA6','#A6588B'];

const BOX_SHAPES = [
  [ {string:1,col:2,role:'other'},{string:1,col:4,role:'other'},{string:1,col:5,role:'other'},
    {string:2,col:2,role:'relminor'},{string:2,col:4,role:'other'},{string:2,col:5,role:'root'},
    {string:3,col:1,role:'other'},{string:3,col:2,role:'other'},{string:3,col:4,role:'other'},
    {string:4,col:1,role:'other'},{string:4,col:2,role:'root'},{string:4,col:4,role:'other'},
    {string:5,col:0,role:'other'},{string:5,col:2,role:'other'},{string:5,col:4,role:'relminor'},
    {string:6,col:0,role:'root'},{string:6,col:2,role:'other'},{string:6,col:4,role:'other'} ],
  [ {string:1,col:2,role:'other'},{string:1,col:3,role:'other'},{string:1,col:5,role:'other'},
    {string:2,col:2,role:'other'},{string:2,col:3,role:'root'},{string:2,col:5,role:'other'},
    {string:3,col:0,role:'other'},{string:3,col:2,role:'other'},{string:3,col:4,role:'relminor'},
    {string:4,col:0,role:'root'},{string:4,col:2,role:'other'},{string:4,col:4,role:'other'},
    {string:5,col:0,role:'other'},{string:5,col:2,role:'relminor'},{string:5,col:4,role:'other'},
    {string:6,col:0,role:'other'},{string:6,col:2,role:'other'},{string:6,col:3,role:'other'} ],
  [ {string:1,col:1,role:'other'},{string:1,col:3,role:'other'},{string:1,col:5,role:'relminor'},
    {string:2,col:1,role:'root'},{string:2,col:3,role:'other'},{string:2,col:5,role:'other'},
    {string:3,col:0,role:'other'},{string:3,col:2,role:'relminor'},{string:3,col:4,role:'other'},
    {string:4,col:0,role:'other'},{string:4,col:2,role:'other'},{string:4,col:3,role:'other'},
    {string:5,col:0,role:'relminor'},{string:5,col:2,role:'other'},{string:5,col:3,role:'root'},
    {string:6,col:0,role:'other'},{string:6,col:1,role:'other'},{string:6,col:3,role:'other'} ],
  [ {string:1,col:2,role:'other'},{string:1,col:4,role:'relminor'},{string:1,col:6,role:'other'},
    {string:2,col:2,role:'other'},{string:2,col:4,role:'other'},{string:2,col:5,role:'other'},
    {string:3,col:1,role:'relminor'},{string:3,col:3,role:'other'},{string:3,col:4,role:'root'},
    {string:4,col:1,role:'other'},{string:4,col:2,role:'other'},{string:4,col:4,role:'other'},
    {string:5,col:1,role:'other'},{string:5,col:2,role:'root'},{string:5,col:4,role:'other'},
    {string:6,col:0,role:'other'},{string:6,col:2,role:'other'},{string:6,col:4,role:'relminor'} ],
  [ {string:1,col:2,role:'relminor'},{string:1,col:4,role:'other'},{string:1,col:5,role:'root'},
    {string:2,col:2,role:'other'},{string:2,col:3,role:'other'},
    {string:3,col:1,role:'other'},{string:3,col:2,role:'root'},{string:3,col:4,role:'other'},
    {string:4,col:0,role:'other'},{string:4,col:2,role:'other'},{string:4,col:4,role:'relminor'},
    {string:5,col:0,role:'root'},{string:5,col:2,role:'other'},{string:5,col:4,role:'other'},
    {string:6,col:0,role:'other'},{string:6,col:2,role:'relminor'},{string:6,col:4,role:'other'} ],
  [ {string:1,col:2,role:'other'},{string:1,col:3,role:'root'},{string:1,col:5,role:'other'},
    {string:2,col:1,role:'other'},{string:2,col:3,role:'other'},{string:2,col:5,role:'relminor'},
    {string:3,col:0,role:'root'},{string:3,col:2,role:'other'},{string:3,col:4,role:'other'},
    {string:4,col:0,role:'other'},{string:4,col:2,role:'relminor'},{string:4,col:4,role:'other'},
    {string:5,col:0,role:'other'},{string:5,col:2,role:'other'},{string:5,col:3,role:'other'},
    {string:6,col:0,role:'relminor'},{string:6,col:2,role:'other'},{string:6,col:3,role:'root'} ],
  [ {string:1,col:1,role:'root'},{string:1,col:3,role:'other'},{string:1,col:5,role:'other'},
    {string:2,col:1,role:'other'},{string:2,col:3,role:'relminor'},{string:2,col:5,role:'other'},
    {string:3,col:0,role:'other'},{string:3,col:2,role:'other'},{string:3,col:3,role:'other'},
    {string:4,col:0,role:'relminor'},{string:4,col:2,role:'other'},{string:4,col:3,role:'root'},
    {string:5,col:0,role:'other'},{string:5,col:1,role:'other'},{string:5,col:3,role:'other'},
    {string:6,col:0,role:'other'},{string:6,col:1,role:'root'},{string:6,col:3,role:'other'} ],
];

// selected: 'all' либо Set с ключами выбранных форм/боксов (мульти-выбор)
let state = { view: 'caged', selected: 'all' };

const STRINGS = 6;
const FRETS = 17;
const marginL = 56, marginR = 30, fretCellPx = 62;
const neckTop = 88, neckBottom = 88 + 5*48;
const totalW = marginL + marginR + FRETS*fretCellPx;

function stringY(s){ return neckTop + (s-1) * ((neckBottom-neckTop)/(STRINGS-1)); }
function fretLineX(n){ return marginL + n*fretCellPx; }
function noteX(fret){ return fretLineX(fret-1) + fretCellPx/2; }

function isVisible(key){
  return state.selected === 'all' || state.selected.has(key);
}

function renderFretboard(){
  const svg = document.getElementById('fretboardSvg');
  svg.setAttribute('viewBox', `0 0 ${totalW} 460`);
  svg.style.width = totalW + 'px';
  svg.style.height = '460px';

  let html = '';

  for (let s=1; s<=STRINGS; s++){
    const y = stringY(s);
    html += `<line x1="${marginL-16}" y1="${y}" x2="${fretLineX(FRETS)}" y2="${y}" stroke="#C9C4B7" stroke-width="1.5"/>`;
    html += `<text x="${marginL-36}" y="${y+5}" font-family="JetBrains Mono, monospace" font-size="14" fill="#8C8678" text-anchor="middle">${STRING_NAMES[s-1]}</text>`;
  }
  for (let f=0; f<=FRETS; f++){
    const x = fretLineX(f);
    html += `<line x1="${x}" y1="${neckTop}" x2="${x}" y2="${neckBottom}" stroke="${f===0?'#201E1A':'#C9C4B7'}" stroke-width="${f===0?4:1.5}"/>`;
  }
  [3,5,7,9,15,17].forEach(f=>{
    if (f>FRETS) return;
    html += `<circle cx="${noteX(f)}" cy="${(neckTop+neckBottom)/2}" r="5" fill="#DCD6C8"/>`;
  });
  if (FRETS>=12){
    const x = noteX(12);
    html += `<circle cx="${x}" cy="${neckTop + (neckBottom-neckTop)/2 - 16}" r="5" fill="#DCD6C8"/>`;
    html += `<circle cx="${x}" cy="${neckTop + (neckBottom-neckTop)/2 + 16}" r="5" fill="#DCD6C8"/>`;
  }
  for (let f=1; f<=FRETS; f++){
    html += `<text x="${noteX(f)}" y="${neckBottom+28}" font-family="JetBrains Mono, monospace" font-size="13" fill="#8C8678" text-anchor="middle">${f}</text>`;
  }

  if (state.view === 'caged'){
    SHAPE_ORDER.forEach(name => {
      if (!isVisible(name)) return;
      const shift = SHAPE_FRET_SHIFT[name];
      const frets = SHAPES[name].map(n => n.fret + shift);
      const minF = Math.min(...frets), maxF = Math.max(...frets);
      const cx = (noteX(minF) + noteX(maxF)) / 2;
      html += `<g>
        <rect x="${cx-16}" y="${neckTop-38}" width="32" height="26" rx="8" fill="${SHAPE_COLOR[name]}"/>
        <text x="${cx}" y="${neckTop-20}" font-family="Inter, sans-serif" font-weight="800" font-size="14" fill="#fff" text-anchor="middle">${name}</text>
      </g>`;
    });
    SHAPE_ORDER.forEach(name => {
      if (!isVisible(name)) return;
      const shift = SHAPE_FRET_SHIFT[name];
      SHAPES[name].forEach(n => {
        const fret = n.fret + shift;
        const cx = noteX(fret), cy = stringY(n.string);
        const color = n.role === 'R' ? '#C1633E' : n.role === '3' ? '#B98B3E' : '#6B8A6E';
        html += `<g>
          <circle cx="${cx}" cy="${cy}" r="15" fill="${color}" stroke="#fff" stroke-width="2.5"/>
          <text x="${cx}" y="${cy+5}" font-family="JetBrains Mono, monospace" font-weight="700" font-size="13" fill="#fff" text-anchor="middle">${n.role}</text>
        </g>`;
      });
    });
  } else {
    for (let b=0; b<7; b++){
      if (!isVisible(b)) continue;
      const anchor = BOX_ANCHOR[b];
      const cols = BOX_SHAPES[b].map(n => n.col);
      const minF = anchor + Math.min(...cols), maxF = anchor + Math.max(...cols);
      const cx = (noteX(minF) + noteX(maxF)) / 2;
      html += `<g>
        <rect x="${cx-16}" y="${neckTop-38}" width="32" height="26" rx="8" fill="${BOX_COLOR[b]}"/>
        <text x="${cx}" y="${neckTop-20}" font-family="Inter, sans-serif" font-weight="800" font-size="14" fill="#fff" text-anchor="middle">${b+1}</text>
      </g>`;
    }
    for (let b=0; b<7; b++){
      if (!isVisible(b)) continue;
      const anchor = BOX_ANCHOR[b];
      BOX_SHAPES[b].forEach(n => {
        const fret = anchor + n.col;
        const cx = noteX(fret), cy = stringY(n.string);
        const color = n.role === 'root' ? '#C1633E' : n.role === 'relminor' ? '#8B5A6B' : '#C7C0AF';
        const textColor = n.role === 'other' ? '#5A5648' : '#fff';
        const label = n.role === 'root' ? 'R' : n.role === 'relminor' ? 'r' : '';
        html += `<g>
          <circle cx="${cx}" cy="${cy}" r="${n.role==='other'?11:15}" fill="${color}" stroke="#fff" stroke-width="2.5"/>
          ${label ? `<text x="${cx}" y="${cy+5}" font-family="JetBrains Mono, monospace" font-weight="700" font-size="13" fill="${textColor}" text-anchor="middle">${label}</text>` : ''}
        </g>`;
      });
    }
  }

  svg.innerHTML = html;
}

function setView(view){
  state.view = view;
  state.selected = 'all';
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.getElementById('fretboardTitle').textContent = view === 'caged' ? 'Гриф · формы CAGED' : 'Гриф · боксы 1–7';
  document.getElementById('keyStatic').textContent = view === 'caged' ? 'C · мажор' : 'F · мажор';
  renderShapeFilter();
  renderLegend();
  renderFretboard();
}

function toggleSelection(key){
  if (state.selected === 'all'){
    state.selected = new Set([key]);
  } else {
    if (state.selected.has(key)) state.selected.delete(key);
    else state.selected.add(key);
    if (state.selected.size === 0) state.selected = 'all';
  }
}

function renderShapeFilter(){
  const wrap = document.getElementById('shapeFilter');
  const hint = document.getElementById('shapeHint');
  wrap.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'shape-chip' + (state.selected === 'all' ? ' active' : '');
  allBtn.textContent = 'Все';
  allBtn.style.setProperty('--shape-color', '#201E1A');
  allBtn.addEventListener('click', () => { state.selected = 'all'; renderShapeFilter(); renderFretboard(); });
  wrap.appendChild(allBtn);

  if (state.view === 'caged'){
    SHAPE_ORDER.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'shape-chip' + (isVisible(name) && state.selected !== 'all' ? ' active' : '');
      btn.textContent = name;
      btn.style.setProperty('--shape-color', SHAPE_COLOR[name]);
      btn.addEventListener('click', () => { toggleSelection(name); renderShapeFilter(); renderFretboard(); });
      wrap.appendChild(btn);
    });
    hint.textContent = 'Можно включить сразу несколько форм — например C и A, чтобы увидеть переход.';
  } else {
    for (let b=0; b<7; b++){
      const btn = document.createElement('button');
      btn.className = 'shape-chip' + (isVisible(b) && state.selected !== 'all' ? ' active' : '');
      btn.textContent = String(b+1);
      btn.title = MODE_NAMES[b];
      btn.style.setProperty('--shape-color', BOX_COLOR[b]);
      btn.addEventListener('click', () => { toggleSelection(b); renderShapeFilter(); renderFretboard(); });
      wrap.appendChild(btn);
    }
    hint.textContent = 'Можно включить сразу несколько боксов — например 1 и 2, чтобы потренировать переход между ними.';
  }
}

function renderLegend(){
  const legend = document.getElementById('legend');
  if (state.view === 'caged'){
    legend.innerHTML = `
      <div class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span> Тоника (R)</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--third)"></span> Терция (3)</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--fifth)"></span> Квинта (5)</div>`;
  } else {
    legend.innerHTML = `
      <div class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span> Тоника мажора (R)</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--relminor)"></span> Тоника минора (r)</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--other)"></span> Остальные ступени</div>`;
  }
}

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => setView(btn.dataset.view));
});

setView('caged');
</script>
</body>
</html>
