<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FretFlow — План</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F4EF;
    --card: #FFFFFF;
    --card2: #EFEBE2;
    --line: #E1DCD0;
    --accent: #C1633E;
    --accent-dark: #A8502F;
    --accent-contrast: #FFFFFF;
    --muted: #8C8678;
    --text: #201E1A;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-badge {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: var(--accent-contrast); font-size: 13px;
  }
  .logo-name { font-weight: 800; font-size: 17px; letter-spacing: -0.01em; }
  .tabs { display: flex; gap: 4px; }
  .tab {
    padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600;
    color: var(--muted); border: 1px solid transparent; white-space: nowrap;
  }
  .tab.active { color: var(--text); background: var(--card2); border-color: var(--line); }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 20px 48px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 20px;
  }

  /* --- таймер занятия --- */
  .timer-panel { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  #timerDisplay {
    font-size: 56px; font-weight: 700; letter-spacing: 0.02em;
    color: var(--text);
  }
  .timer-controls { display: flex; gap: 10px; width: 100%; max-width: 320px; }
  .timer-btn {
    flex: 1; height: 52px; border-radius: 14px; border: none;
    font-weight: 800; font-size: 15px; cursor: pointer;
    transition: transform 0.08s, background 0.15s;
  }
  .timer-start { background: var(--accent); color: #fff; }
  .timer-start.running { background: var(--accent-dark); }
  .timer-reset { background: var(--card2); color: var(--text); border: 1px solid var(--line); }
  .timer-btn:active { transform: scale(0.97); }

  /* --- прогресс по плану --- */
  .plan-progress { font-size: 13px; color: var(--muted); text-align: center; }
  .plan-progress b { color: var(--text); }

  /* --- недели и дни --- */
  .week-label {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); font-weight: 700; margin: 6px 4px 2px;
  }

  .day-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    overflow: hidden;
  }
  .day-header {
    width: 100%; display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; background: none; border: none; cursor: pointer; text-align: left;
  }
  .day-header:hover { background: var(--card2); }
  .day-check { flex-shrink: 0; width: 22px; height: 22px; }
  .day-check input {
    width: 22px; height: 22px; accent-color: var(--accent); cursor: pointer;
  }
  .day-num {
    flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 13px;
    color: var(--accent); min-width: 58px;
  }
  .day-teaser { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
  .day-chevron { flex-shrink: 0; color: var(--muted); font-size: 12px; transition: transform 0.15s; }
  .day-card.open .day-chevron { transform: rotate(180deg); }
  .day-card.done .day-teaser { color: var(--muted); text-decoration: line-through; }

  .day-body { display: none; padding: 0 16px 18px 52px; }
  .day-card.open .day-body { display: block; }

  .block-label {
    display: inline-block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); font-weight: 700; margin-bottom: 4px; margin-top: 12px;
  }
  .block-text { font-size: 14px; line-height: 1.5; margin: 0; }
  .block-text a { color: var(--accent); font-weight: 700; text-decoration: none; border-bottom: 1px dashed var(--accent); }
  .block-text a:hover { border-bottom-style: solid; }
  .block-note { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 4px; }

  .day-result {
    margin-top: 14px; padding: 12px 14px; border-radius: 12px;
    background: #F1DFD4; color: var(--accent-dark);
    font-size: 14px; font-weight: 700;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-badge">FF</div>
    <span class="logo-name">FretFlow</span>
  </div>
  <div class="tabs">
    <div class="tab">Ритм</div>
    <div class="tab">Гриф</div>
    <div class="tab active">План</div>
  </div>
</header>

<main>

  <div class="panel timer-panel">
    <div id="timerDisplay" class="mono">00:00:00</div>

  <div id="planList"></div>

</main>

const doneDays = new Set();

function linksHTML(links){
  if (!links || links.length === 0) return '';
  return links.map(l => ` <a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join(' ·');
}

function renderPlan(){
  const list = document.getElementById('planList');
  list.innerHTML = '';
  let currentWeek = 0;

  PLAN.forEach(d => {
    if (d.week !== currentWeek){
      currentWeek = d.week;
      const label = document.createElement('div');
      label.className = 'week-label';
      label.textContent = `Неделя ${currentWeek}`;
      list.appendChild(label);
    }

    const card = document.createElement('div');
    card.className = 'day-card' + (doneDays.has(d.day) ? ' done' : '');
    card.style.marginBottom = '8px';

    const header = document.createElement('button');
    header.className = 'day-header';
    header.innerHTML = `
      <span class="day-check"><input type="checkbox" ${doneDays.has(d.day)?'checked':''} data-day="${d.day}"></span>
      <span class="day-num">День ${d.day}</span>
      <span class="day-teaser">${d.teaser}</span>
      <span class="day-chevron">▾</span>`;
    header.addEventListener('click', (e) => {
      if (e.target.tagName === 'INPUT') return;
      card.classList.toggle('open');
    });

    const checkbox = header.querySelector('input');
    checkbox.addEventListener('click', (e) => {
      e.stopPropagation();
      if (checkbox.checked) doneDays.add(d.day); else doneDays.delete(d.day);
      card.classList.toggle('done', checkbox.checked);
      document.getElementById('doneCount').textContent = doneDays.size;
    });

    const body = document.createElement('div');
    body.className = 'day-body';
    body.innerHTML = `
      <span class="block-label">Утро · 45 мин</span>
      <p class="block-text">${d.morning}${linksHTML(d.morningLinks)}</p>
      ${d.morningNote ? `<div class="block-note">${d.morningNote}</div>` : ''}
      <span class="block-label">Днём · 15–20 мин</span>
      <p class="block-text">${d.midday}</p>
      <div class="day-result">«${d.result}»</div>
    `;

    card.appendChild(header);
    card.appendChild(body);
    list.appendChild(card);
  });
}

/* ---------- таймер занятия (секундомер, считает вверх) ---------- */
let timerSeconds = 0;
let timerRunning = false;
let timerInterval = null;

function formatTime(total){
  const h = String(Math.floor(total/3600)).padStart(2,'0');
  const m = String(Math.floor((total%3600)/60)).padStart(2,'0');
  const s = String(total%60).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

document.getElementById('timerStart').addEventListener('click', function(){
  timerRunning = !timerRunning;
  this.textContent = timerRunning ? 'Пауза' : 'Старт';
  this.classList.toggle('running', timerRunning);
  if (timerRunning){
    timerInterval = setInterval(() => {
      timerSeconds++;
      document.getElementById('timerDisplay').textContent = formatTime(timerSeconds);
    }, 1000);
  } else {
    clearInterval(timerInterval);
  }
});

document.getElementById('timerReset').addEventListener('click', () => {
  timerRunning = false;
  clearInterval(timerInterval);
  timerSeconds = 0;
  document.getElementById('timerDisplay').textContent = formatTime(0);
  const startBtn = document.getElementById('timerStart');
  startBtn.textContent = 'Старт';
  startBtn.classList.remove('running');
});

renderPlan();
</script>
